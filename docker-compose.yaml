services:

  # ── 1. Zookeeper ──────────────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── 2. Kafka Broker ───────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'false'
      KAFKA_NUM_PARTITIONS: 4
      KAFKA_MESSAGE_MAX_BYTES: 1000000
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9092 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ── 3. Topic Init (runs once, then exits) ─────────────────────────────────
  init-kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: init-kafka
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        echo '>>> Creating stock-prices topic with 4 partitions...'
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic stock-prices --partitions 4 --replication-factor 1
        echo '>>> Topic ready. Listing all topics:'
        kafka-topics --bootstrap-server kafka:9092 --list
        echo '>>> Done.'

  # ── 4. Stock Producer ─────────────────────────────────────────────────────
  producer:
    build:
      context: .
      dockerfile: dockerfile.producer
    container_name: stock-producer
    depends_on:
      init-kafka:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      KAFKA_BROKER: kafka:9092
    restart: on-failure

  # ── 5. Spark Structured Streaming Consumer ────────────────────────────────
  spark-consumer:
    build:
      context: .
      dockerfile: dockerfile.consumer
    container_name: spark-consumer
    depends_on:
      init-kafka:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      KAFKA_BROKER: kafka:9092
      HADOOP_HOME: /opt/hadoop
      SPARK_CHECKPOINT: /tmp/spark-checkpoints/stock-stream
    volumes:
      - spark-checkpoints:/tmp/spark-checkpoints
    restart: on-failure

# ── Named Volumes ──────────────────────────────────────────────────────────
volumes:
  spark-checkpoints:
    driver: local